<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venda seu carro</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h3>Cadestre seu veiculo para vender mais raido!</h3>
        </div>
        <div class="form-container">
            <div class="form-header">
                <p>Formulario</p>
            </div>
            <div class="form-body">
                <h1 class="form-title">Venda fácil seu carro!</h1>
                <p>Descreva as carracterísticas e marque os opcionais que ele possui</p>
                <form>
                    <!-- TITULO DE VENDA -->
                    <div class="box-input">
                        <label for="title">
                            Titulo do anuncio<span class="required-field">*</span></label>
                        <input 
                            type="text" 
                            name="title" 
                            id="title" 
                            class="block"
                            placeholder="um titulo para anuncia seu carro" 
                            minlength="1" 
                            maxlength="30" 
                            required>
                    </div>

                    <!-- PREÇO -->
                    <div class="box-input">
                        <label for="price">preço <span class="required-field">*</span></label>
                        <input 
                            type="number" 
                            name="price" 
                            id="price" 
                            class="block"
                            placeholder="defina o preço"  required>
                    </div>

                    <!-- DESCRIÇAÕ -->
                    <div class="box-input">
                        <label for="description">descrição<span class="required-field">*</span></label>
                        <textarea name="description" id="description" class="block"
                        placeholder="Descrição do veiculo"></textarea>
                    </div>

                    <!-- MARCA -->
                    <div class="box-input">
                        <label for="brand">
                            Marca<span class="required-field">*</span></label>
                        <input 
                            type="text" 
                            name="brand" 
                            id="brand" 
                            class="block"
                            placeholder="Digite a marca do veiculo" 
                            required>
                    </div>

                    <!-- MODELO -->
                    <div class="box-input">
                        <label for="model">
                            modelo<span class="required-field">*</span></label>
                        <input 
                            type="text" 
                            name="model" 
                            id="model" 
                            class="block"
                            placeholder="Digite o modelo do veiculo" 
                            required>
                    </div>

                    <!-- KILOMETRAGEM -->
                    <div class="box-input">
                        <label for="mileage">
                            Kilometragem<span class="required-field">*</span></label>
                        <input 
                            type="number" 
                            name="mileage" 
                            id="mileage" 
                            class="block"
                            placeholder="Digite a kilometragem do veiculo" 
                            required>
                    </div>

                    <!-- DATA DE COMPRA -->
                    <div class="box-input">
                        <label for="purchase_date">
                            Data de compra<span class="required-field">*</span></label>
                        <input 
                            type="date" 
                            name="purchase_date" 
                            id="purchase_date" 
                            class="block" 
                            required>
                    </div>

                    <!-- TIPO DE CAMBIO -->
                    <div class="box-input">
                        <p>Tipo de câmbio: <span class="required-filded">*</span></p>
                        <input type="radio" id="manual" name="gear">
                        <label for="manual">Manual</label>
                        <input type="radio" id="automatico" name="gear">
                        <label for="automatico">Automatico</label>
                    </div>

                    <!-- OPICIONAIS -->
                    <div class="optional-box">
                        <p>Opicioais</p>
                        <ul class="optional-list">
                            <li>
                                <input
                                    type="checkbox" 
                                    id="airbag" 
                                    name="optional[]" 
                                    value="airbag">
                                <label for="airbag">Airbag</label>
                            </li>
                            <li>
                                <input
                                    type="checkbox" 
                                    id="alarm" 
                                    name="optional[]" 
                                    value="alarm">
                                <label for="alarm">Alarm</label>
                            </li>
                            <li>
                                <input
                                    type="checkbox" 
                                    id="reverse_camera" 
                                    name="optional[]" 
                                    value="reverse_camera">
                                <label for="reverse_camera">Camera de ré</label>
                            </li>
                            <li>
                                <input
                                    type="checkbox" 
                                    id="ac" 
                                    name="optional[]" 
                                    value="ac">
                                <label for="ac">Ar condicionado</label>
                            </li>
                        </ul>
                    </div>

                    <!-- OPCIONAL 2 -->
                    <div class="optional-box">
                        <ul class="optional-list">
                            <li>
                                <input
                                    type="checkbox" 
                                    id="lane_assist" 
                                    name="optional[]" 
                                    value="lane_assist">
                                <label for="lane_assist">Assistente de pista</label>
                            </li>
                            <li>
                                <input
                                    type="checkbox" 
                                    id="keyless" 
                                    name="optional[]" 
                                    value="keyless">
                                <label for="keyless">Partida Keyless</label>
                            </li>
                            <li>
                                <input
                                    type="checkbox" 
                                    id="smartphone" 
                                    name="optional[]" 
                                    value="smartphone">
                                <label for="smartphone">Integração com o celular</label>
                            </li>
                            <li>
                                <input
                                    type="checkbox" 
                                    id="leather_seat" 
                                    name="optional[]" 
                                    value="leather_seat">
                                <label for="leather_seat">Banco de couro</label>
                            </li>
                        </ul>
                    </div>

                    <!-- ENVIAR FOTOS -->
                    <div class="box-input">
                        <p>Fotos do carro: <span class="required-filded">*</span></p>
                        <input 
                            type="file" 
                            multiple accept="image/png, imagem/jpg" 
                            id="imagem" 
                            name="imagem" 
                            required
                        >
                    </div>
                    <input type="submit" value="Enviar" class="btn-submit">  
                </form>
            </div>
        </div>
    </div>
</body>
</html>
