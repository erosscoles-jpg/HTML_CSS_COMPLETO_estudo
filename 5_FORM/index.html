<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <h2>Formularios HTML</h2>
    <!-- 1 - PRIMEIRO FORMULÁRIO -->
    <!-- 2 - ATRIBUTOS FORMULÁRIO -->
    <form action="register.php" method="GET"></form>
        <div>
            <label>Nome:</label>
            <input type="text">
        </div>

        <!-- 3 - ATRIBUTO NAME -->
        <div>
            <label>
                <!-- 4 - ATRIBUTO LABEL -->
                <label for="age">IDADE:</label>
                <input type="text" name="age">
            </label>
        </div>

        <!-- 6 - SELECT -->
         <div>
            <label for="job">Selecione a sua profissão</label>
            <select name="job">
                <option value="programador">Programador</option>
                <option value="tester">Tester/QA</option>
                <option value="devOps">DevOps</option>
            </select>
         </div>

        <!-- 7 - ATRIBUTO SELECTED  -->
         <div>
            <label for="contract">Você leu os termos do contrato</label>
            <select name="contract">
                <option value="sim">Sim</option>
                <option value="não" selected>Não</option>
            </select>
         </div>
        
        <!-- 8 MULTIPLAS OPÇÕES -->
         <div>
            <label for="items">Selecione os itens desejados:</label>
            <select name="items" multiple>
                <option value="pera">Pera</option>
                <option value="feijao">Feijão</option>
                <option value="arroz">Arroz</option>
            </select>
         </div>

        <!-- 9 - TEXTAREA -->
         <div>
            <label for="comment">Deixe seu comentario</label>
            <textarea name="comment"></textarea>
         </div>

        <!-- 10 - FIELDSET E LEGEND -->
         <div>
            <fieldset>
                <legend>Preencha as suas inforações</legend>
                <label for="firstname">Nome:</label>
                <input type="text" name="firstname">
                <label for="lastname">Sobrenome:</label>
                <input type="text" name="lastname">
            </fieldset>
         </div>

        <!-- 11 - DATALIST -->
         <div>
            <label for="flavor">Escolha o sabor</label>
            <input type="text" list="flavors" name="flavor">

            <datalist id="flavors">
                <option value="Cereja"></option>
                <option value="Abacaxi"></option>
                <option value="Morango"></option>
                <option value="Chocolate"></option>
            </datalist>
         </div>

        <!-- 12 - IMPUT SENHA -->
         <div>
            <label for="password">Digite sua senha:</label>
            <input type="password" name="password">
         </div>

        <!-- 14 - INPUT RADIO -->
         <div>
            <label for="car_model">Escolha o modelo do seu carro:</label>
            <div class="radio">
                <input type="radio" value="bmw" name="car_model">
                <label for="bmw">BMW</label>
            </div>
            <div class="radio">
                <input type="radio" value="ferrari" name="car_model">
                <label for="ferrari">Ferrari</label>
            </div>
            <div class="radio">
                <input type="radio" value="ford" name="car_model">
                <label for="ford">Ford</label>
            </div>
         </div>

        <!-- 15 - CHECKBOX -->
         <div>
            <label for="optionals">Opicionais do carro:</label>
            <div class="radio">
                <input type="checkbox" name="optional[]" value="big_tires">
                <label for="bit_tires">Pneus Grandes</label>
            </div>
            <div class="radio">
                <input type="checkbox" name="optional[]" value="turbo_engine">
                <label for="turbo_engine">Motor Turbo</label>
            </div>
            <div class="radio">
                <input type="checkbox" name="optional[]" value="hybrid">
                <label for="hybrid">Hibridos</label>
            </div>
         </div>

        <!-- 16 - IMPUT DATA -->
         <div>
            <label for="birthday">Data de nascimento:</label>
            <input type="date" name="birthday">
         </div>

         
        <!-- 17 - IMPUT DE ARQUIVOS -->
         <div>
            <label for="image">Insira a sua imagem:</label>
            <input type="file" name="image">
         </div>

        <!-- 18 - IMPUT PARA NUMEROS -->
         <div>
            <label for="salary">Seu salario</label>
            <input type="number" name="salary">
         </div>

        <!-- 19 - IMPUT PARA EMAILS -->
         <div>
            <label for="email">Digite seu email:</label>
            <input type="email" name="email">
         </div>

        <!-- 20 - VALUE -->
         <div>
            <label for="value">Digite algum valor</label>
            <input type="text" value="o meu valor é este" name="value">
         </div>

        <!-- 21 - ATRIBUTO DISABLED -->
         <div>
            <p>Tente mudar o valor</p>
            <input type="text" value="Nâo prescisa preencher" disabled>
         </div>

        <!-- 22 - ATRIBUTO PLACEHOLDER -->
         <div>
            <label for="currentjob">Digite sua Porfissão</label>
            <input type="text" name="currentjob" placeholder="No que você esta trabalhando agora?">
         </div>

        <!-- 23 - ATRIBUTO REQUIRED -->
         <div>
            <label for="birthyear">Ano Nascimento</label>
            <input type="text" placeholder="Digiteo ano de nascimento" required>
         </div>

        <!-- 13 - RESETAT FORM -->
         <input type="reset" value="limpar">

        <!-- 5 - ENVIO DO FORMES -->
         <input type="submit" value="ENVIAR">

        

    </form>
</body>
</html>
